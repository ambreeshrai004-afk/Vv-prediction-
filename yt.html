<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Karma Big Small Predictor</title>

<style>

body{
background:black;
color:#00ff88;
font-family:Consolas;
text-align:center;
margin:0;
overflow:hidden;
}

/* MATRIX */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* PANEL */

.panel{
margin-top:120px;
width:350px;
margin-left:auto;
margin-right:auto;
background:rgba(0,0,0,0.75);
border:1px solid #00ff88;
border-radius:10px;
padding:25px;
box-shadow:0 0 20px #00ff88;
}

.title{
font-size:26px;
margin-bottom:20px;
}

.textbox{
font-size:18px;
margin:10px;
}

.result{
font-size:40px;
font-weight:bold;
margin:20px;
}

button{
background:#00ff88;
border:none;
padding:12px 25px;
font-size:18px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#00cc66;
}

.telegram{
position:fixed;
bottom:20px;
right:20px;
font-size:36px;
text-decoration:none;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="panel">

<div class="title">Karma Big Small Predictor</div>

<div class="textbox" id="period">Period</div>

<div class="textbox" id="timer">00:00</div>

<div class="result" id="result">---</div>

<button onclick="generate()">GENERATE</button>

</div>

<a class="telegram" href="https://t.me/YOUR_USERNAME" target="_blank">📩</a>

<script>

/* MATRIX BACKGROUND */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="0123456789";
letters=letters.split("");

let fontSize=14;
let columns=canvas.width/fontSize;

let drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff88";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}

setInterval(draw,33);


/* PERIOD SYSTEM */

function updatePeriod(){

let now=new Date();

let seconds=now.getSeconds();
let remaining=60-seconds;

let currentHour=now.getHours();
let currentMinute=now.getMinutes();

let startHour=5;
let startMinute=29;

let elapsedMinutes=(currentHour*60+currentMinute)-(startHour*60+startMinute);

if(elapsedMinutes<0){
elapsedMinutes=0;
}

let yyyy=now.getFullYear();
let mm=String(now.getMonth()+1).padStart(2,'0');
let dd=String(now.getDate()).padStart(2,'0');

let date=yyyy+mm+dd;

let period="100001"+String(elapsedMinutes).padStart(4,'0');

document.getElementById("period").innerText=date+period;

document.getElementById("timer").innerText="00:"+String(remaining).padStart(2,'0');

}

setInterval(updatePeriod,1000);


/* BIG SMALL PREDICTION */

function generate(){

let result=Math.random()<0.5 ? "BIG" : "SMALL";

document.getElementById("result").innerText=result;

}

</script>

</body>
</html>
